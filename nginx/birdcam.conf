server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /var/www/birdcam;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Reverse-proxy each uStreamer instance. Buffering MUST be off so the
    # multipart/x-mixed-replace MJPEG stream is passed through frame-by-frame
    # instead of being buffered.
    location /cam1/ {
        proxy_pass http://127.0.0.1:8081/;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        chunked_transfer_encoding off;
    }

    location /cam2/ {
        proxy_pass http://127.0.0.1:8082/;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        chunked_transfer_encoding off;
    }
}
