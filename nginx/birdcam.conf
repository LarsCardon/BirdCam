# BirdCam nginx template. install.sh expands the @@CAM_LOCATIONS@@ marker into
# one reverse-proxy block per configured camera and installs the result as
# /etc/nginx/sites-available/birdcam.conf.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /var/www/birdcam;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # One reverse-proxy block per camera is generated here by install.sh,
    # replacing the marker below (cam1 -> :8081, cam2 -> :8082, ...).
    @@CAM_LOCATIONS@@
}
